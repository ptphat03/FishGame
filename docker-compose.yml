services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fish_game
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  arena:
    build:
      context: .
      dockerfile: services/arena/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@db:5432/fish_game?sslmode=disable
      ACCESS_TOKEN_KEY: ${ACCESS_TOKEN_KEY}
      ACCESS_TOKEN_EXPIRY: ${ACCESS_TOKEN_EXPIRY:-15m}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-dev-secret}
    depends_on:
      db:
        condition: service_healthy

  hub:
    build:
      context: .
      dockerfile: docker/hub.Dockerfile
    restart: unless-stopped
    ports:
      - "5100:5100"
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Database=fish_game;Username=postgres;Password=postgres"
      Jwt__AccessTokenKey: ${ACCESS_TOKEN_KEY}
      Jwt__AccessTokenExpiry: ${ACCESS_TOKEN_EXPIRY:-15m}
      Jwt__RefreshTokenExpiry: ${REFRESH_TOKEN_EXPIRY:-168h}
      AllowedOrigins: ${ALLOWED_ORIGINS:-http://localhost:3000}
      GameServer__InternalUrl: "http://arena:8080"
      GameServer__InternalSecret: ${INTERNAL_SECRET:-dev-secret}
      ASPNETCORE_ENVIRONMENT: ${APP_ENV:-Development}
    depends_on:
      db:
        condition: service_healthy
      arena:
        condition: service_started

  react:
    build:
      context: ./client/react
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - hub
      - arena


volumes:
  postgres_data:
