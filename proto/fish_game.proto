syntax = "proto3";

package fishgame;

option go_package       = "github.com/PhanBaThien/Fish-Game/services/game-server/internal/pb;fishgamepb";
option csharp_namespace = "FishGame.Proto";

// ─── Client → Server ─────────────────────────────────────────────────────────

message JoinRoomRequest {
  int64 room_id = 1;
}

message ClientReadyRequest {}

message ShootRequest {
  float pos_x      = 1;
  float pos_y      = 2;
  float angle      = 3;
  int64 bet_amount = 4;
}

message HitFishRequest {
  int32  fish_id     = 1;
  string instance_id = 2;
}

message LeaveRoomRequest {}

message PingRequest {}

// ─── Server → Client ─────────────────────────────────────────────────────────

message SessionStartedEvent {
  int64 session_id = 1;
  int32 seat_id    = 2;
  int64 balance    = 3;
}

message ShootAckEvent {
  int64 shots_fired = 1;
  int64 total_spend = 2;
  int64 balance     = 3;
}

message HitResultEvent {
  bool   killed      = 1;
  int32  fish_id     = 2;
  string instance_id = 3;
  int64  earn        = 4;   // reward (only when killed=true)
  int64  balance     = 5;   // updated balance
  int64  total_earn  = 6;
  int32  fish_killed = 7;
}

message SessionEndedEvent {
  int64 final_balance = 1;
  int64 total_earn    = 2;
  int64 total_spend   = 3;
  int32 fish_killed   = 4;
  int32 shots_fired   = 5;
}

message SpawnFishEvent {
  string instance_id = 1;
  int32  fish_id     = 2;
  int32  path_id     = 3;
  int64  spawn_time  = 4;  // Unix milliseconds
  int32  duration    = 5;  // max lifetime in seconds
  float  speed       = 6;  // animation speed hint for Unity
  string asset_path  = 7;  // texture path for Unity
}

message BroadcastShootEvent {
  int32 seat_id = 1;
  float pos_x   = 2;
  float pos_y   = 3;
  float angle   = 4;
}

message BroadcastKillEvent {
  string instance_id = 1;
  int32  seat_id     = 2;
}

message ErrorEvent {
  string code    = 1;
  string message = 2;
}

message PongEvent {}

// ─── Envelope ─────────────────────────────────────────────────────────────────
// All WebSocket frames are a single Envelope. The oneof field selects the
// payload type at the cost of one extra varint tag — much cheaper than JSON.

message Envelope {
  oneof payload {
    // client → server
    JoinRoomRequest    join_room    = 1;
    ClientReadyRequest client_ready = 2;
    ShootRequest       shoot        = 3;
    HitFishRequest     hit_fish     = 4;
    LeaveRoomRequest   leave_room   = 5;
    PingRequest        ping         = 6;

    // server → client
    SessionStartedEvent session_started = 10;
    ShootAckEvent       shoot_ack       = 11;
    HitResultEvent      hit_result      = 12;
    SessionEndedEvent   session_ended   = 13;
    SpawnFishEvent      spawn_fish      = 14;
    BroadcastShootEvent broadcast_shoot = 15;
    BroadcastKillEvent  broadcast_kill  = 16;
    ErrorEvent          error           = 17;
    PongEvent           pong            = 18;
  }
}
