<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="body" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#166534"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Spikes -->
  <g fill="#a855f7" filter="url(#glow)">
    <polygon points="50,15 45,0 55,0" />
    <polygon points="50,85 45,100 55,100" />
    <polygon points="15,50 0,45 0,55" />
    <polygon points="85,50 100,45 100,55" />
    <polygon points="25,25 10,10 18,8" />
    <polygon points="75,25 90,10 82,8" />
    <polygon points="25,75 10,90 18,92" />
    <polygon points="75,75 90,90 82,92" />
  </g>
  <!-- Body -->
  <circle cx="50" cy="50" r="35" fill="url(#body)" />
  <!-- Eyes -->
  <circle cx="65" cy="40" r="6" fill="#000" />
  <circle cx="67" cy="38" r="2" fill="#ef4444" filter="url(#glow)" />
  <!-- Mouth -->
  <path d="M 80,55 Q 85,60 80,65" stroke="#ef4444" stroke-width="3" fill="none" />
</svg>
