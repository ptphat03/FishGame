<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" width="100" height="80">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Flippers -->
  <ellipse cx="30" cy="15" rx="20" ry="8" transform="rotate(-30 30 15)" fill="#064e3b" />
  <ellipse cx="30" cy="65" rx="20" ry="8" transform="rotate(30 30 65)" fill="#064e3b" />
  <ellipse cx="70" cy="15" rx="15" ry="6" transform="rotate(30 70 15)" fill="#064e3b" />
  <ellipse cx="70" cy="65" rx="15" ry="6" transform="rotate(-30 70 65)" fill="#064e3b" />
  <!-- Head -->
  <ellipse cx="85" cy="40" rx="15" ry="10" fill="#047857" />
  <circle cx="92" cy="36" r="3" fill="#10b981" filter="url(#glow)" />
  <!-- Shell -->
  <polygon points="30,40 40,20 70,20 80,40 70,60 40,60" fill="#0f766e" stroke="#14b8a6" stroke-width="3" filter="url(#glow)" />
  <polygon points="45,40 50,30 60,30 65,40 60,50 50,50" fill="none" stroke="#5eead4" stroke-width="2" />
</svg>
