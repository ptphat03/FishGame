<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60" width="100" height="60">
  <defs>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Tail -->
  <polygon points="10,30 0,10 5,30 0,50" fill="#c2410c" />
  <!-- Body -->
  <ellipse cx="50" cy="30" rx="40" ry="20" fill="url(#body)" />
  <!-- Stripes -->
  <path d="M 40,12 Q 50,30 40,48" stroke="#22d3ee" stroke-width="4" fill="none" filter="url(#glow)"/>
  <path d="M 65,15 Q 75,30 65,45" stroke="#22d3ee" stroke-width="4" fill="none" filter="url(#glow)"/>
  <!-- Fins -->
  <polygon points="40,10 50,0 60,10" fill="#ea580c" />
  <!-- Eye -->
  <circle cx="75" cy="22" r="5" fill="#fff" />
  <circle cx="77" cy="22" r="2" fill="#000" />
</svg>
