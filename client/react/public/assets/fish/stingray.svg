<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 60" width="120" height="60">
  <defs>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Tail -->
  <path d="M 40,30 Q 10,40 0,20" stroke="#60a5fa" stroke-width="3" fill="none" filter="url(#glow)"/>
  <!-- Body Diamond -->
  <polygon points="40,30 75,5 110,30 75,55" fill="url(#body)" stroke="#60a5fa" stroke-width="2" filter="url(#glow)"/>
  <!-- Cyber lines -->
  <path d="M 50,30 L 100,30" stroke="#93c5fd" stroke-width="1" />
  <path d="M 75,15 L 75,45" stroke="#93c5fd" stroke-width="1" />
  <!-- Eye -->
  <circle cx="85" cy="25" r="3" fill="#38bdf8" filter="url(#glow)"/>
  <circle cx="85" cy="35" r="3" fill="#38bdf8" filter="url(#glow)"/>
</svg>
